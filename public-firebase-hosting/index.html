<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gilded Salon</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #f5f2eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container { padding: 2rem; }
    h1 { font-size: 3rem; color: #c8a45c; margin-bottom: 0.5rem; letter-spacing: 2px; }
    p { font-size: 1.2rem; color: #a09888; margin-bottom: 2rem; }
    .badge { color: #1a7a6b; font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; }
    a { color: #c8a45c; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Dubai Marina</div>
    <h1>Gilded Salon</h1>
    <p>Luxury booking experience — coming soon to iOS &amp; Android</p>
    <p><a href="https://github.com/paulxg12/gilded-salon-app">View on GitHub</a></p>
  </div>
</body>
</html>
